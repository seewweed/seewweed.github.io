<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JavaScript in Browser</title>
    <!-- ここで外部のJavaScriptファイルを読み込む場合 -->
    <script src="main.js"></script>
    <script>
    function goToPage() {
        window.location.href = "https://seewweed.github.io/LifeGame.html";
    }
    </script>
</head>
<body>
    <!-- JavaScriptコードを直接記述する場合も可能 -->
    <script>
        const myName = "Your Name"; // 自分の名前をここに設定する
        document.write("<h1>Hello, " + myName + "!</h1>");
    </script>
    <button onclick="goToPage()">LifeGameで遊ぶ</button>
</body>
</html>
